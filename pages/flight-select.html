<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航班选择 - SkyGo</title>
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <script src="../js/common.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--fb-primary);
    --color-border: var(--fb-border);
  }
  @layer base {
    body { background: var(--fb-background); color: var(--fb-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      body { background-color: var(--fb-bg-body); color: var(--fb-fg-primary); }
      
      .flight-card {
        transition: all 0.3s ease;
      }
      .flight-card:hover {
        transform: translateY(-2px);
      }
      
      .sort-btn {
        transition: all 0.2s ease;
      }
      .sort-btn.active {
        background: var(--fb-primary);
        color: white;
        border-color: var(--fb-primary);
      }
      
      .filter-tag {
        transition: all 0.2s ease;
        cursor: pointer;
      }
      .filter-tag.active {
        background: rgba(59, 130, 246, 0.15);
        border-color: var(--fb-primary);
        color: var(--fb-primary-light);
      }
      
      .theme-toggle-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid var(--fb-border);
        color: var(--fb-fg-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .theme-toggle-btn:hover {
        color: var(--fb-primary-light);
        border-color: var(--fb-primary);
      }
      
      .search-loading {
        display: none;
      }
      .searching .search-loading {
        display: inline-block;
      }
      .searching .search-text {
        display: none;
      }
      
      .empty-state {
        text-align: center;
        padding: 60px 20px;
      }
      
      @media (max-width: 767px) {
        .hero-section { height: 160px !important; }
        .hero-title { font-size: 1.5rem !important; }
      }
    </style>
</head>
<body>
<main>

<nav class="fixed top-0 left-0 right-0 z-50 h-16" style="background-color: var(--fb-bg-surface); border-bottom: 1px solid var(--fb-border);">
  <div class="max-w-7xl mx-auto h-full px-4 md:px-6 flex items-center justify-between">
    <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
      <i data-lucide="plane" class="w-5 h-5" style="color: var(--fb-primary-light);"></i>
      <span class="text-lg font-semibold" style="color: var(--fb-primary-light);">SkyGo</span>
    </div>
    <div class="flex items-center gap-3">
      <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="切换主题">
        <i data-lucide="sun" id="theme-icon" class="w-4 h-4"></i>
      </button>
      <div class="hidden sm:flex items-center gap-3">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium" style="background-color: var(--fb-primary); color: var(--fb-fg-on-primary);" id="user-avatar">张</div>
        <span class="text-sm" style="color: var(--fb-fg-primary);" id="user-name">张三</span>
        <a href="#" class="text-sm hover:opacity-80 transition-opacity" style="color: var(--fb-fg-secondary);" onclick="handleLogout(event)">退出</a>
      </div>
      <button class="sm:hidden w-8 h-8 flex items-center justify-center" style="color: var(--fb-fg-secondary);" onclick="toggleMobileMenu()">
        <i data-lucide="menu" class="w-5 h-5"></i>
      </button>
    </div>
  </div>
  
  <div id="mobile-menu" class="sm:hidden" style="display: none; background: var(--fb-bg-surface); border-bottom: 1px solid var(--fb-border); padding: 12px 16px;">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium" style="background-color: var(--fb-primary); color: var(--fb-fg-on-primary);" id="mobile-user-avatar">张</div>
      <span class="text-sm" style="color: var(--fb-fg-primary);" id="mobile-user-name">张三</span>
    </div>
    <a href="#" class="text-sm block py-2" style="color: var(--fb-fg-secondary);" onclick="handleLogout(event)">退出登录</a>
  </div>
</nav>

<section class="relative pt-16 hero-section" style="height: 200px;">
  <img src="../assets/flight-select-hero.jpg" alt="航班选择" class="absolute inset-0 w-full h-full object-cover">
  <div class="absolute inset-0" style="background: linear-gradient(to bottom, rgba(15,23,42,0.3), rgba(15,23,42,0.7));"></div>
  <div class="relative z-10 h-full flex flex-col items-center justify-center px-6 text-center">
    <h1 class="text-3xl md:text-4xl font-semibold hero-title" style="color: var(--fb-fg-primary); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">发现你的下一趟旅程</h1>
    <p class="mt-3 text-base md:text-lg" style="color: var(--fb-fg-secondary);">AI 智能分析百万航线，为你找到最优选择</p>
  </div>
</section>

<section class="max-w-5xl mx-auto px-4 md:px-6 -mt-6 relative z-20">
  <div class="rounded-xl p-5 md:p-6 backdrop-blur-md" style="background-color: rgba(30,41,59,0.85); border: 1px solid var(--fb-border);">
    <div class="flex items-center gap-1 mb-5 rounded-lg p-1 inline-flex" style="background-color: var(--fb-bg-surface-elevated);">
      <button id="trip-oneway" class="px-4 py-1.5 rounded-md text-sm font-medium whitespace-nowrap transition-colors" style="background-color: var(--fb-primary); color: var(--fb-fg-on-primary);" onclick="switchTripType('oneway')">单程</button>
      <button id="trip-roundtrip" class="px-4 py-1.5 rounded-md text-sm font-medium whitespace-nowrap transition-colors" style="color: var(--fb-fg-secondary);" onclick="switchTripType('roundtrip')">往返</button>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
      <div>
        <label class="block text-xs font-medium mb-1.5" style="color: var(--fb-fg-secondary);">出发城市</label>
        <div class="relative">
          <input type="text" id="from-city" placeholder="北京" class="w-full h-10 px-3 rounded-lg text-sm outline-none transition-shadow" style="background-color: var(--fb-bg-surface-elevated); color: var(--fb-fg-primary); border: 1px solid var(--fb-border);">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium mb-1.5" style="color: var(--fb-fg-secondary);">到达城市</label>
        <div class="relative">
          <input type="text" id="to-city" placeholder="上海" class="w-full h-10 px-3 rounded-lg text-sm outline-none transition-shadow" style="background-color: var(--fb-bg-surface-elevated); color: var(--fb-fg-primary); border: 1px solid var(--fb-border);">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium mb-1.5" style="color: var(--fb-fg-secondary);">出发日期</label>
        <input type="date" id="depart-date" value="2026-07-01" class="w-full h-10 px-3 rounded-lg text-sm outline-none transition-shadow" style="background-color: var(--fb-bg-surface-elevated); color: var(--fb-fg-primary); border: 1px solid var(--fb-border);">
      </div>
      <div id="return-date-wrapper">
        <label class="block text-xs font-medium mb-1.5" style="color: var(--fb-fg-secondary);">返回日期</label>
        <input type="date" id="return-date" value="2026-07-05" class="w-full h-10 px-3 rounded-lg text-sm outline-none transition-shadow" style="background-color: var(--fb-bg-surface-elevated); color: var(--fb-fg-primary); border: 1px solid var(--fb-border);">
      </div>
      <div>
        <button id="search-btn" class="w-full h-10 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 whitespace-nowrap transition-all hover:opacity-90 hover:-translate-y-px" style="background: linear-gradient(135deg, var(--fb-primary), var(--fb-state-info)); color: var(--fb-fg-on-primary);" onclick="searchFlights()">
          <i data-lucide="search" class="w-4 h-4 search-text"></i>
          <span class="search-text">搜索航班</span>
          <div class="search-loading" style="width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        </button>
      </div>
    </div>
  </div>
</section>

<section class="max-w-5xl mx-auto px-4 md:px-6 mt-8">
  <div class="flex flex-wrap items-center gap-3 mb-2">
    <div class="flex items-center gap-2">
      <i data-lucide="sparkles" class="w-5 h-5" style="color: var(--fb-state-info);"></i>
      <h2 class="text-xl font-semibold" style="color: var(--fb-fg-primary);">AI 智能推荐</h2>
    </div>
    <span id="flight-count" class="text-xs px-2 py-0.5 rounded-full" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-tertiary);">共 3 个航班</span>
  </div>
  <p class="text-sm mb-6" style="color: var(--fb-fg-secondary);">基于你的出行偏好和实时数据分析</p>

  <div class="flex flex-wrap gap-2 mb-6">
    <span class="text-xs font-medium" style="color: var(--fb-fg-tertiary); align-self: center;">排序：</span>
    <button class="sort-btn active px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="sortFlights('recommend', this)">智能推荐</button>
    <button class="sort-btn px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="sortFlights('price', this)">价格最低</button>
    <button class="sort-btn px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="sortFlights('duration', this)">用时最短</button>
    <button class="sort-btn px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="sortFlights('depart', this)">出发最早</button>
  </div>

  <div class="flex flex-wrap gap-2 mb-6">
    <span class="text-xs font-medium" style="color: var(--fb-fg-tertiary); align-self: center;">筛选：</span>
    <span class="filter-tag active px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="filterAirline('all', this)">全部</span>
    <span class="filter-tag px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="filterAirline('国航', this)">国航</span>
    <span class="filter-tag px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="filterAirline('东航', this)">东航</span>
    <span class="filter-tag px-3 py-1 rounded-full text-xs border" style="background: var(--fb-bg-surface-elevated); color: var(--fb-fg-secondary); border-color: var(--fb-border);" onclick="filterAirline('南航', this)">南航</span>
  </div>

  <div id="flight-list" class="flex flex-col gap-4">
  </div>
  
  <div id="empty-state" class="empty-state" style="display: none;">
    <i data-lucide="plane" style="width: 48px; height: 48px; color: var(--fb-fg-tertiary); margin-bottom: 16px;"></i>
    <p style="color: var(--fb-fg-secondary); margin-bottom: 8px;">暂无符合条件的航班</p>
    <p class="text-sm" style="color: var(--fb-fg-tertiary);">试试调整筛选条件或搜索其他日期</p>
  </div>
</section>

<div id="booking-modal" style="display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; padding: 16px;">
  <div class="animate-slide-up" style="background: var(--fb-bg-surface); border: 1px solid var(--fb-border); border-radius: var(--fb-radius-lg); max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto;">
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold" style="color: var(--fb-fg-primary);">确认预订</h3>
        <button onclick="closeBookingModal()" style="background: none; border: none; color: var(--fb-fg-tertiary); cursor: pointer; padding: 4px;">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <div id="booking-flight-info" style="padding: 16px; border-radius: var(--fb-radius-md); background: var(--fb-bg-surface-elevated); margin-bottom: 20px;">
      </div>
      
      <div class="space-y-4 mb-6">
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color: var(--fb-fg-secondary);">乘客姓名</label>
          <input type="text" placeholder="请输入姓名" class="w-full h-10 px-3 rounded-lg text-sm outline-none" style="background: var(--fb-bg-body); color: var(--fb-fg-primary); border: 1px solid var(--fb-border);">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color: var(--fb-fg-secondary);">身份证号</label>
          <input type="text" placeholder="请输入身份证号" class="w-full h-10 px-3 rounded-lg text-sm outline-none" style="background: var(--fb-bg-body); color: var(--fb-fg-primary); border: 1px solid var(--fb-border);">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color: var(--fb-fg-secondary);">联系电话</label>
          <input type="tel" placeholder="请输入手机号" class="w-full h-10 px-3 rounded-lg text-sm outline-none" style="background: var(--fb-bg-body); color: var(--fb-fg-primary); border: 1px solid var(--fb-border);">
        </div>
      </div>
      
      <div class="flex items-center justify-between mb-6 pt-4" style="border-top: 1px solid var(--fb-border);">
        <span class="text-sm" style="color: var(--fb-fg-secondary);">总价</span>
        <span id="booking-total-price" class="text-2xl font-bold" style="color: var(--fb-primary-lighter);">¥0</span>
      </div>
      
      <button onclick="confirmBooking()" class="w-full h-12 rounded-lg text-sm font-semibold transition-all hover:opacity-90" style="background: linear-gradient(135deg, var(--fb-primary), var(--fb-state-info)); color: var(--fb-fg-on-primary);">
        确认支付
      </button>
    </div>
  </div>
</div>

<footer class="mt-16 pb-8 text-center">
  <p class="text-xs" style="color: var(--fb-fg-secondary);">SkyGo AI 航班预定</p>
</footer>

</main>

<script>
const flightsData = [
  {
    id: 1,
    airline: '国航',
    flightNo: 'CA1234',
    aircraft: '波音 737-800',
    departTime: '08:30',
    departCity: '北京',
    departAirport: 'PEK',
    arriveTime: '10:45',
    arriveCity: '上海',
    arriveAirport: 'SHA',
    duration: '2h15m',
    price: 1280,
    isRecommend: true
  },
  {
    id: 2,
    airline: '东航',
    flightNo: 'MU5678',
    aircraft: '空客 A320',
    departTime: '10:15',
    departCity: '北京',
    departAirport: 'PEK',
    arriveTime: '12:30',
    arriveCity: '上海',
    arriveAirport: 'SHA',
    duration: '2h15m',
    price: 980,
    isRecommend: false
  },
  {
    id: 3,
    airline: '南航',
    flightNo: 'CZ9012',
    aircraft: '空客 A321',
    departTime: '14:00',
    departCity: '北京',
    departAirport: 'PEK',
    arriveTime: '16:20',
    arriveCity: '上海',
    arriveAirport: 'PVG',
    duration: '2h20m',
    price: 1050,
    isRecommend: false
  },
  {
    id: 4,
    airline: '国航',
    flightNo: 'CA5678',
    aircraft: '波音 787-9',
    departTime: '06:30',
    departCity: '北京',
    departAirport: 'PEK',
    arriveTime: '08:50',
    arriveCity: '上海',
    arriveAirport: 'PVG',
    duration: '2h20m',
    price: 1580,
    isRecommend: false
  },
  {
    id: 5,
    airline: '东航',
    flightNo: 'MU1234',
    aircraft: '空客 A330',
    departTime: '18:00',
    departCity: '北京',
    departAirport: 'PKX',
    arriveTime: '20:25',
    arriveCity: '上海',
    arriveAirport: 'SHA',
    duration: '2h25m',
    price: 880,
    isRecommend: false
  }
];

let currentFlights = [...flightsData];
let currentSort = 'recommend';
let currentFilter = 'all';
let selectedFlight = null;

function renderFlights() {
  const flightList = document.getElementById('flight-list');
  const emptyState = document.getElementById('empty-state');
  const countEl = document.getElementById('flight-count');
  
  countEl.textContent = `共 ${currentFlights.length} 个航班`;
  
  if (currentFlights.length === 0) {
    flightList.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }
  
  flightList.style.display = 'flex';
  emptyState.style.display = 'none';
  
  flightList.innerHTML = currentFlights.map((flight, index) => `
    <div class="flight-card rounded-xl p-5 flex flex-col md:flex-row md:items-center gap-4 relative" 
         style="background-color: var(--fb-bg-surface); border: 1px solid ${flight.isRecommend ? 'var(--fb-state-info)' : 'var(--fb-border)'}; ${flight.isRecommend ? 'box-shadow: 0 0 16px rgba(59,130,246,0.15);' : ''} animation-delay: ${index * 0.1}s;"
         class="animate-fade-in">
      ${flight.isRecommend ? `
        <span class="absolute top-3 right-3 inline-flex items-center gap-1 px-2.5 py-0.5 rounded-md text-xs font-medium whitespace-nowrap" style="background-color: rgba(59,130,246,0.15); color: var(--fb-state-info); border: 1px solid rgba(59,130,246,0.3);">
          <i data-lucide="sparkles" class="w-3 h-3"></i>
          AI 推荐
        </span>
      ` : ''}
      <div class="flex items-center gap-3 md:w-48 shrink-0">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background-color: var(--fb-bg-surface-elevated);">
          <i data-lucide="plane" class="w-5 h-5" style="color: ${flight.isRecommend ? 'var(--fb-primary-light)' : 'var(--fb-fg-secondary)'};"></i>
        </div>
        <div>
          <span class="text-sm font-medium" style="color: var(--fb-fg-primary);">${flight.airline}</span>
          <span class="block text-xs" style="color: var(--fb-fg-secondary);">${flight.flightNo}</span>
        </div>
      </div>
      <div class="flex-1 min-w-0 flex flex-col md:flex-row md:items-center gap-3 md:gap-6">
        <div class="flex items-center gap-4">
          <div class="text-right">
            <span class="text-lg font-semibold" style="color: var(--fb-fg-primary);">${flight.departTime}</span>
            <span class="block text-xs" style="color: var(--fb-fg-secondary);">${flight.departCity} (${flight.departAirport})</span>
          </div>
          <div class="flex flex-col items-center px-2">
            <span class="text-xs whitespace-nowrap" style="color: var(--fb-fg-secondary);">${flight.duration}</span>
            <div class="w-16 h-px my-1" style="background-color: var(--fb-border);"></div>
            <i data-lucide="plane" class="w-3 h-3" style="color: var(--fb-fg-secondary);"></i>
          </div>
          <div>
            <span class="text-lg font-semibold" style="color: var(--fb-fg-primary);">${flight.arriveTime}</span>
            <span class="block text-xs" style="color: var(--fb-fg-secondary);">${flight.arriveCity} (${flight.arriveAirport})</span>
          </div>
        </div>
        <span class="text-xs" style="color: var(--fb-fg-secondary);">${flight.aircraft}</span>
      </div>
      <div class="flex items-center justify-between md:flex-col md:items-end gap-2 shrink-0">
        <span class="text-2xl font-bold" style="color: ${flight.isRecommend ? 'var(--fb-primary-lighter)' : 'var(--fb-fg-primary)'};">${SkyGo.utils.formatPrice(flight.price)}</span>
        <button class="px-5 py-2 rounded-lg text-sm font-semibold flex items-center justify-center whitespace-nowrap transition-all hover:opacity-90 hover:-translate-y-px" 
                style="${flight.isRecommend ? 'background: linear-gradient(135deg, var(--fb-primary), var(--fb-state-info)); color: var(--fb-fg-on-primary);' : 'border: 1px solid var(--fb-primary); color: var(--fb-primary); background: transparent;'}"
                onclick="selectFlight(${flight.id})">
          选择此航班
        </button>
      </div>
    </div>
  `).join('');
  
  lucide.createIcons({ root: flightList });
}

function sortFlights(type, btn) {
  currentSort = type;
  
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  switch(type) {
    case 'recommend':
      currentFlights.sort((a, b) => {
        if (a.isRecommend && !b.isRecommend) return -1;
        if (!a.isRecommend && b.isRecommend) return 1;
        return a.price - b.price;
      });
      break;
    case 'price':
      currentFlights.sort((a, b) => a.price - b.price);
      break;
    case 'duration':
      currentFlights.sort((a, b) => {
        const getMins = (d) => {
          const parts = d.match(/(\d+)h(\d+)m/);
          return parseInt(parts[1]) * 60 + parseInt(parts[2]);
        };
        return getMins(a.duration) - getMins(b.duration);
      });
      break;
    case 'depart':
      currentFlights.sort((a, b) => a.departTime.localeCompare(b.departTime));
      break;
  }
  
  renderFlights();
}

function filterAirline(airline, el) {
  currentFilter = airline;
  
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  
  if (airline === 'all') {
    currentFlights = [...flightsData];
  } else {
    currentFlights = flightsData.filter(f => f.airline === airline);
  }
  
  sortFlights(currentSort, document.querySelector('.sort-btn.active'));
}

function switchTripType(type) {
  const onewayBtn = document.getElementById('trip-oneway');
  const roundtripBtn = document.getElementById('trip-roundtrip');
  const returnWrapper = document.getElementById('return-date-wrapper');
  
  if (type === 'oneway') {
    onewayBtn.style.backgroundColor = 'var(--fb-primary)';
    onewayBtn.style.color = 'var(--fb-fg-on-primary)';
    roundtripBtn.style.backgroundColor = 'transparent';
    roundtripBtn.style.color = 'var(--fb-fg-secondary)';
    returnWrapper.style.display = 'none';
  } else {
    roundtripBtn.style.backgroundColor = 'var(--fb-primary)';
    roundtripBtn.style.color = 'var(--fb-fg-on-primary)';
    onewayBtn.style.backgroundColor = 'transparent';
    onewayBtn.style.color = 'var(--fb-fg-secondary)';
    returnWrapper.style.display = 'block';
  }
}

function searchFlights() {
  const btn = document.getElementById('search-btn');
  btn.classList.add('searching');
  btn.disabled = true;
  
  setTimeout(() => {
    btn.classList.remove('searching');
    btn.disabled = false;
    
    const fromCity = document.getElementById('from-city').value;
    const toCity = document.getElementById('to-city').value;
    
    if (fromCity || toCity) {
      SkyGo.ui.toast(`正在搜索 ${fromCity || '北京'} → ${toCity || '上海'} 的航班`, 'info', 2000);
    } else {
      SkyGo.ui.toast('已刷新航班列表', 'success', 2000);
    }
    
    currentFlights = [...flightsData];
    currentFilter = 'all';
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    document.querySelector('.filter-tag').classList.add('active');
    sortFlights(currentSort, document.querySelector('.sort-btn.active'));
  }, 1200);
}

function selectFlight(id) {
  selectedFlight = currentFlights.find(f => f.id === id);
  if (!selectedFlight) return;
  
  const modal = document.getElementById('booking-modal');
  const flightInfo = document.getElementById('booking-flight-info');
  const totalPrice = document.getElementById('booking-total-price');
  
  flightInfo.innerHTML = `
    <div class="flex items-center gap-3 mb-3">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: var(--fb-bg-body);">
        <i data-lucide="plane" class="w-5 h-5" style="color: var(--fb-primary-light);"></i>
      </div>
      <div>
        <div class="font-medium" style="color: var(--fb-fg-primary);">${selectedFlight.airline} ${selectedFlight.flightNo}</div>
        <div class="text-xs" style="color: var(--fb-fg-secondary);">${selectedFlight.aircraft}</div>
      </div>
    </div>
    <div class="flex items-center justify-between">
      <div class="text-center">
        <div class="text-lg font-semibold" style="color: var(--fb-fg-primary);">${selectedFlight.departTime}</div>
        <div class="text-xs" style="color: var(--fb-fg-secondary);">${selectedFlight.departCity} ${selectedFlight.departAirport}</div>
      </div>
      <div class="flex-1 px-4 flex flex-col items-center">
        <span class="text-xs" style="color: var(--fb-fg-tertiary);">${selectedFlight.duration}</span>
        <div class="w-full h-px my-2" style="background: var(--fb-border); position: relative;">
          <div style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--fb-bg-surface-elevated); padding: 0 4px;">
            <i data-lucide="plane" class="w-3 h-3" style="color: var(--fb-fg-tertiary);"></i>
          </div>
        </div>
      </div>
      <div class="text-center">
        <div class="text-lg font-semibold" style="color: var(--fb-fg-primary);">${selectedFlight.arriveTime}</div>
        <div class="text-xs" style="color: var(--fb-fg-secondary);">${selectedFlight.arriveCity} ${selectedFlight.arriveAirport}</div>
      </div>
    </div>
  `;
  
  totalPrice.textContent = SkyGo.utils.formatPrice(selectedFlight.price);
  
  modal.style.display = 'flex';
  lucide.createIcons({ root: modal });
}

function closeBookingModal() {
  const modal = document.getElementById('booking-modal');
  modal.style.display = 'none';
  selectedFlight = null;
}

function confirmBooking() {
  SkyGo.ui.confirm('确认支付该航班吗？', '订单确认').then((confirmed) => {
    if (confirmed) {
      SkyGo.ui.toast('正在处理支付...', 'info', 1500);
      setTimeout(() => {
        closeBookingModal();
        SkyGo.ui.toast('预订成功！订单信息已发送至您的手机', 'success', 3000);
      }, 1500);
    }
  });
}

function toggleTheme() {
  const newTheme = SkyGo.theme.toggle();
  updateThemeIcon(newTheme);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('theme-icon');
  if (icon) {
    icon.setAttribute('data-lucide', theme === 'light' ? 'moon' : 'sun');
    lucide.createIcons({ root: document.querySelector('.theme-toggle-btn') });
  }
}

function toggleMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function handleLogout(e) {
  e.preventDefault();
  SkyGo.ui.confirm('确定要退出登录吗？', '退出登录').then((confirmed) => {
    if (confirmed) {
      SkyGo.auth.logout();
      SkyGo.ui.toast('已退出登录', 'success', 1500);
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1000);
    }
  });
}

function goHome() {
  window.location.reload();
}

document.addEventListener('DOMContentLoaded', function() {
  const user = SkyGo.auth.getUser();
  if (user) {
    const userName = user.name || '用户';
    const userAvatar = user.avatar || userName.charAt(0);
    
    document.getElementById('user-name').textContent = userName;
    document.getElementById('mobile-user-name').textContent = userName;
    document.getElementById('user-avatar').textContent = userAvatar;
    document.getElementById('mobile-user-avatar').textContent = userAvatar;
  }
  
  const currentTheme = document.documentElement.classList.contains('light') ? 'light' : 'dark';
  updateThemeIcon(currentTheme);
  
  switchTripType('oneway');
  renderFlights();
  
  document.getElementById('booking-modal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeBookingModal();
    }
  });
  
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeBookingModal();
    }
  });
});
</script>
<script>lucide.createIcons();</script>
</body>
</html>
